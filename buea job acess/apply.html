<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Now - BueaJobs</title>
    <link rel="stylesheet" href="js/style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">BueaJobs</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="jobs.html">Job Details</a></li>
                <li><a href="post-job.html">Post a Job</a></li>
            </ul>
        </nav>
    </header>

    <div style="max-width: 650px; margin: 40px auto; padding: 20px;">
        <h1 style="text-align: center; margin-bottom: 30px; color: #067928;">Job Application Form</h1>
        
        <form id="applicationForm" style="background: #f9f9f9; padding: 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            
            <label>Full Name *</label>
            <input type="text" id="fullName" placeholder="Enter your full name" required>

            <label>Email Address *</label>
            <input type="email" id="email" placeholder="example@gmail.com" required>

            <label>Phone Number *</label>
            <input type="tel" id="phone" placeholder="(+237) 6XX XXX XXX" required>

            <label>Job Title You're Applying For</label>
            <input type="text" id="jobTitle" value="Junior Web Developer" readonly>

            <label>Upload CV (PDF) *</label>
            <input type="file" id="cv" accept=".pdf" required>

            <button type="submit" class="btn" style="width: 100%; padding: 15px; font-size: 1.1rem; margin-top: 25px;">
                Submit Application
            </button>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 BueaJobs - Youth Employment Platform</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
