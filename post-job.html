<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job - BueaJobs</title>
    <link rel="stylesheet" href="js/style.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation -->
    <header>
        <nav>
            <div class="logo">BueaJobs</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="jobs.html">Job Details</a></li>
                <li><a href="apply.html">Apply for a job</a></li>
            </ul>
        </nav>
    </header>

    <div style="max-width: 700px; margin: 3rem auto; padding: 2rem;">
        <h1 style="text-align: center; margin-bottom: 2rem;">Post a New Job</h1>
        
        <form id="postJobForm">
            <label>Company Name *</label>
            <input type="text" id="companyName" required>

            <label>Job Title *</label>
            <input type="text" id="jobTitle" required>

            <label>Location</label>
            <input type="text" id="location" value="Buea, Cameroon" required>

            <label>Job Type</label>
            <select id="jobType" required>
                <option value="">Select Type</option>
                <option value="Full-time">Full-time</option>
                <option value="Part-time">Part-time</option>
                <option value="Internship">Internship</option>
                <option value="Freelance">Freelance</option>
            </select>
              <br>
            <label>Job Description *</label>
            <textarea id="description" rows="6" required></textarea>

            <button type="submit" style="width: 100%; margin-top: 20px; padding: 15px;">Post Job</button>
        </form>
    </div>

    <footer style="background: #0c0168; color: white; text-align: center; padding: 2rem;">
        <p>&copy; 2026 BueaJobs - Youth Employment Platform</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
